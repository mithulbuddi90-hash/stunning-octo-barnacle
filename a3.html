<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON</title>
</head>
<body>
    <h2>Convert a JSON String to a JavaScript Object</h2>
    <p id="result"> </p>
    <script>
        var myObj ={ name: "Mithul", age:12, grade: 7};
        var myJSON = JSON.stringify(myObj);
        var newObj =JSON.parse(myJSON);
        document.getElementById("result").innerHTML = newObj.name + ", " + newObj.age + " ," + newObj.grade;
    </script>
</body>
</html>
